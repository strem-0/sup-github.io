<html lang="ar" dir="rtl"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشغل وبوابة YouTube TV</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
      background-size: 400% 400%;
      animation: gradientAnimation 12s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    @keyframes gradientAnimation {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* الحاوية الزجاجية البلورية */
    .tv-card {
      width: 100%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      backdrop-filter: blur(35px);
      -webkit-backdrop-filter: blur(35px);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      padding: 35px;
      text-align: center;
    }

    h1 {
      color: #fff;
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    /* حاوية الأزرار التفاعلية */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* زر تحميل الإضافة */
    .btn-extension {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    .btn-extension:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }

    /* زر فتح واجهة التلفزيون */
    .btn-tv {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
    }

    .btn-tv:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
    }

    .footer-note {
      margin-top: 30px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="tv-card">
    <h1></h1>
    <p>تم نقل موقعنا الى موقع جديد  يرجى الضغط على الزر لاحمر للانتقال اليه</p>

    <div class="button-group">
        

      <!-- زر فتح YouTube TV في نافذة جديدة -->
      <a href="https://www.strem-0.github.io.com" target="_blank" class="btn btn-tv">اضغط هنا للدخول الى موقعنا الجديد</a>
    </div>

    
  </div>



</body></html>
